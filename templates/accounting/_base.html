<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Accounting{% endblock %} — Meili</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1.5rem; color: #222; }
    h1, h2 { margin-top: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
    th { background: #f4f6f8; }
    .right { text-align: right; font-variant-numeric: tabular-nums; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.85em; }
    .badge.draft { background: #fff3cd; }
    .badge.posted { background: #d1e7dd; }
    .badge.reversed { background: #f8d7da; }
    nav a { margin-right: 1rem; }
    .muted { color: #666; }
    form.inline { display: inline; }
    .messages { background: #eef; padding: 0.5rem 1rem; margin: 0.5rem 0; }
    button, .btn { padding: 6px 12px; border: 1px solid #888; background: #fff; cursor: pointer; }
    button.primary, .btn.primary { background: #1f6feb; color: #fff; border-color: #1f6feb; }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'accounting:account-list' %}">Chart of Accounts</a>
    <a href="{% url 'accounting:general-ledger' %}">General Ledger</a>
    <a href="{% url 'accounting:journal-create' %}">New Journal Entry</a>
    <a href="{% url 'accounting:commission-report' %}">Commission Income</a>
  </nav>
  <hr>
  {% if messages %}
    {% for msg in messages %}<div class="messages">{{ msg }}</div>{% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</body>
</html>
