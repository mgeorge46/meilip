# Meili Property — production stack (bare-metal app + DB, containerised broker + Celery only).
#
# Layout assumed:
#   - Django app (gunicorn) runs on the host as a systemd service
#   - PostgreSQL runs on the host
#   - This compose stack provides ONLY: rabbitmq, celery worker, celery beat, flower
#
# Connectivity: containers reach the host via `host.docker.internal` (added to
# every service via `extra_hosts: host-gateway`). Set DATABASE_URL in your .env
# to point at the host, e.g. `postgresql://postgres:***@host.docker.internal:5432/meili_prd01`.
# Set CELERY_BROKER_URL=amqp://meili:***@rabbitmq:5672/meili — Celery containers
# reach the broker by service name; the bare-metal Django app reaches it on
# localhost:5672 (because we publish the port).
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Required env (in .env):
#   SECRET_KEY, ALLOWED_HOSTS, DATABASE_URL, CELERY_BROKER_URL,
#   RABBITMQ_USER, RABBITMQ_PASSWORD, RABBITMQ_VHOST, FLOWER_BASIC_AUTH

x-django-env: &django-env
  DJANGO_ENV: prod
  DJANGO_SETTINGS_MODULE: meili_property.settings.prod
  SECRET_KEY: ${SECRET_KEY}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS}
  # Database lives on the HOST. Use host.docker.internal in the URL.
  DATABASE_URL: ${DATABASE_URL}
  # Broker container is reachable as `rabbitmq` from sibling containers.
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: django-db
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENV: ${SENTRY_ENV:-production}
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@meili.example}
  NOTIFICATION_PROVIDERS: ${NOTIFICATION_PROVIDERS:-{"SMS":"at","WHATSAPP":"at","EMAIL":"smtp"}}
  AT_API_KEY: ${AT_API_KEY:-}
  AT_USERNAME: ${AT_USERNAME:-sandbox}
  AT_SENDER_ID: ${AT_SENDER_ID:-}
  FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH}

# Shared host-mapping so containers can reach the bare-metal Postgres on the host
x-host-gateway: &host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: meili_rabbitmq
    ports:
      - "5672:5672"        # bare-metal Django app connects here
      - "15672:15672"      # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-meili}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-meili}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  celery_worker:
    image: meili_property:latest      # built from the same Dockerfile as the host app
    container_name: meili_celery_worker
    environment:
      <<: *django-env
    <<: *host-gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: celery -A meili_property worker --loglevel=INFO --concurrency=4
    restart: unless-stopped

  celery_beat:
    # IMPORTANT: ONLY ONE beat instance in the stack. Duplicate beats
    # cause duplicate schedule firings.
    image: meili_property:latest
    container_name: meili_celery_beat
    environment:
      <<: *django-env
    <<: *host-gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: celery -A meili_property beat --loglevel=INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped

  flower:
    image: meili_property:latest
    container_name: meili_flower
    environment:
      <<: *django-env
    <<: *host-gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "5555:5555"        # bare-metal nginx (or operator) hits this directly
    command: celery -A meili_property flower --port=5555 --basic_auth=${FLOWER_BASIC_AUTH}
    restart: unless-stopped

volumes:
  rabbitmq_data:

# REMOVED (now on bare metal):
#   - postgres   (Postgres runs as a systemd service on the host)
#   - web        (gunicorn runs as a systemd service on the host)
#   - nginx      (Nginx runs on the host; reverse-proxies to gunicorn @ 127.0.0.1
#                  and to flower @ 127.0.0.1:5555)
