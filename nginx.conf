# Meili Property — nginx reverse proxy config for docker-compose.prod.yml.
# Expects TLS cert + key mounted at /etc/nginx/tls/fullchain.pem + privkey.pem.

upstream meili_web {
    server web:8000;
}

upstream meili_flower {
    server flower:5555;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers — django also emits some; nginx catches everything.
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 20M;

    # Static + media served directly (faster than hitting gunicorn)
    location /static/ {
        alias /srv/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /media/ {
        alias /srv/media/;
        access_log off;
        expires 7d;
    }

    # Flower — reverse-proxied. Flower is protected by its own basic-auth
    # (FLOWER_BASIC_AUTH). Reaching /flower/ in a browser still requires
    # a Django-authenticated ADMIN session in front of this in your LB/VPN.
    location /flower/ {
        proxy_pass http://meili_flower;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # App
    location / {
        proxy_pass http://meili_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }
}
